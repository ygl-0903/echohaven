<!-- Monochrome mark for dark UI / dark tab bar. Same geometry as mark-dark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <defs>
    <clipPath id="eh-r">
      <rect x="12" y="0" width="20" height="32" />
    </clipPath>
  </defs>
  <g clip-path="url(#eh-r)" fill="none" stroke="#d4af37" stroke-width="2.2" stroke-linecap="round">
    <circle cx="12" cy="14" r="4.5" />
    <circle cx="12" cy="14" r="9.5" />
  </g>
  <circle cx="12" cy="14" r="3.2" fill="#d4af37" />
  <rect x="8" y="17.5" width="16" height="9.5" rx="2.2" fill="#d4af37" />
</svg>
